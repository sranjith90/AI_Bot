kind = "web"
previewPath = "/"
title = "ButterflyBot Website"
version = "1.0.0"
id = "artifacts/butterflybot-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22305

[services.development]
run = "pnpm --filter @workspace/butterflybot-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/butterflybot-site", "run", "build" ]
publicDir = "artifacts/butterflybot-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22305"
BASE_PATH = "/"
