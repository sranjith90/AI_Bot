name: Build React App

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm --filter ./artifacts/butterflybot-site install

      - name: Build React app
        run: pnpm --filter ./artifacts/butterflybot-site run build
